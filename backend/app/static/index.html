<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GrimmGear Mediarr</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open');document.querySelector('.mobile-overlay').classList.toggle('active')">&#9776;</div>
<div class="mobile-overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('active')"></div>
<div id="app">
    <nav id="sidebar">
        <div class="brand" onclick="navigate('dashboard')">
            <div class="brand-icon">G</div><span>Mediarr</span>
        </div>
        <div class="nav-links">
            <a class="nav-link active" data-page="dashboard" href="#dashboard" onclick="navigate('dashboard')"><span class="nav-icon">&#9632;</span> Dashboard</a>
            <a class="nav-link" data-page="movies" href="#movies" onclick="navigate('movies')"><span class="nav-icon">&#127916;</span> Movies</a>
            <a class="nav-link" data-page="tv" href="#tv" onclick="navigate('tv')"><span class="nav-icon">&#128250;</span> TV Shows</a>
            <a class="nav-link" data-page="search" href="#search" onclick="navigate('search')"><span class="nav-icon">&#128269;</span> Search</a>
            <a class="nav-link" data-page="downloads" href="#downloads" onclick="navigate('downloads')"><span class="nav-icon">&#11015;</span> Downloads</a>
            <a class="nav-link" data-page="library" href="#library" onclick="navigate('library')"><span class="nav-icon">&#128218;</span> Library</a>
            <a class="nav-link" data-page="music" href="#music" onclick="navigate('music')"><span class="nav-icon">&#127925;</span> Music</a>
            <a class="nav-link" data-page="books" href="#books" onclick="navigate('books')"><span class="nav-icon">&#128214;</span> Books</a>
            <a class="nav-link" data-page="comics" href="#comics" onclick="navigate('comics')"><span class="nav-icon">&#128173;</span> Comics</a>
            <a class="nav-link" data-page="calendar" href="#calendar" onclick="navigate('calendar')"><span class="nav-icon">&#128197;</span> Calendar</a>
            <a class="nav-link" data-page="requests" href="#requests" onclick="navigate('requests')"><span class="nav-icon">&#128221;</span> Requests</a>
            <a class="nav-link" data-page="indexers" href="#indexers" onclick="navigate('indexers')"><span class="nav-icon">&#128279;</span> Indexers</a>
            <a class="nav-link" data-page="blocklist" href="#blocklist" onclick="navigate('blocklist')"><span class="nav-icon">&#128683;</span> Blocklist</a>
            <a class="nav-link" data-page="connect" href="#connect" onclick="navigate('connect')"><span class="nav-icon">&#128268;</span> Connect</a>
            <a class="nav-link" data-page="system" href="#system" onclick="navigate('system')"><span class="nav-icon">&#128295;</span> System</a>
            <a class="nav-link" data-page="settings" href="#settings" onclick="navigate('settings')"><span class="nav-icon">&#9881;</span> Settings</a>
        </div>
        <div class="nav-footer">
            <span class="speed-dot"></span>
            <span id="dl-speed-mini">0 MB/s</span>
        </div>
    </nav>
    <main id="content"></main>
</div>
<script src="/static/app.js"></script>
<script src="/static/pages.js"></script>
</body>
</html>
